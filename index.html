<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --accent: #c8f04a;
    --accent2: #4af0c8;
    --accent3: #f04a8c;
    --text: #f0f0ec;
    --muted: #7a7d88;
    --card-radius: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo-dot { color: var(--text); }

  .tagline {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    margin-left: auto;
  }

  main {
    flex: 1;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--card-radius);
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: #1a1e14;
  }

  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }

  .upload-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--text);
  }

  .upload-sub {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .or-divider {
    display: flex; align-items: center; gap: 16px; color: var(--muted);
    font-size: 0.75rem; font-family: 'DM Mono', monospace;
  }
  .or-divider::before, .or-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .paste-area {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--card-radius);
    padding: 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    resize: vertical;
    min-height: 100px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.2s;
  }
  .paste-area:focus { border-color: var(--accent); }
  .paste-area::placeholder { color: var(--muted); }

  .analyze-btn {
    align-self: flex-end;
    background: var(--accent);
    color: #0e0f11;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .analyze-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 60px;
  }
  .loading.active { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .dashboard {
    display: none;
    flex-direction: column;
    gap: 20px;
    animation: fadeUp 0.4s ease;
  }
  .dashboard.active { display: flex; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .dash-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--text);
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .dash-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 700px) { .dash-grid { grid-template-columns: 1fr; } }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--accent);
  }

  .stat-sub {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.78rem;
  }

  .bar-label {
    width: 90px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 10px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .bar-val {
    width: 50px;
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    flex-shrink: 0;
  }

  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .donut-svg { flex-shrink: 0; }

  .donut-legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-name { color: var(--muted); flex: 1; font-family: 'DM Mono', monospace; font-size: 0.7rem; }
  .legend-pct { color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.7rem; }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    grid-column: 1 / -1;
  }

  .summary-text {
    font-size: 0.88rem;
    line-height: 1.75;
    color: #c8c9d0;
  }

  .insight-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
  }

  .chip.highlight {
    border-color: var(--accent);
    color: var(--accent);
    background: #1a1e14;
  }
</style>
</head>
<body>

<header>
  <div class="logo">clarity<span class="logo-dot">.</span></div>
  <div class="tagline">drop data → get answers</div>
</header>

<main>

  <div id="inputSection">
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.pdf,.txt,.json">
      <div class="upload-icon">📂</div>
      <div class="upload-title">Drop your file here</div>
      <div class="upload-sub">CSV · XLSX · PDF · TXT · JSON</div>
    </div>

    <div class="or-divider" style="margin: 16px 0;">or paste your data</div>

    <textarea class="paste-area" id="pasteArea" placeholder="Paste anything — a table, raw numbers, a report, bullet points, anything..."></textarea>

    <button class="analyze-btn" id="analyzeBtn" style="margin-top: 12px;" onclick="analyze()">
      <span>✦</span> Analyze
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Reading your data...</div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <div class="dash-title" id="dashTitle">Your Data, Clarified</div>
      <button class="reset-btn" onclick="reset()">← New data</button>
    </div>

    <div class="stats-row" id="statsRow"></div>
    <div class="dash-grid" id="dashGrid"></div>

    <div class="summary-card">
      <div class="card-label">✦ Plain-English Summary</div>
      <div class="summary-text" id="summaryText"></div>
      <div class="insight-chips" id="insightChips"></div>
    </div>
  </div>

</main>

<script>
  let fileContent = '';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });

  function readFile(file) {
    if (file.type === 'application/pdf') {
      fileContent = `[PDF file: ${file.name}]`;
      document.getElementById('pasteArea').value = '';
      document.getElementById('pasteArea').placeholder = `PDF loaded: ${file.name} — Claude will analyze it`;
    } else {
      const reader = new FileReader();
      reader.onload = e => {
        fileContent = e.target.result;
        document.getElementById('pasteArea').value = fileContent.slice(0, 3000);
      };
      reader.readAsText(file);
    }
  }

  async function analyze() {
    const raw = document.getElementById('pasteArea').value.trim() || fileContent.trim();
    if (!raw) { alert('Please paste some data or upload a file first.'); return; }

    document.getElementById('inputSection').style.display = 'none';
    document.getElementById('loading').classList.add('active');

    const prompt = `You are a data analyst. The user has provided raw data. Analyze it and respond ONLY with a JSON object (no markdown, no extra text) in this exact format:

{
  "title": "Short descriptive title for this dataset",
  "stats": [
    { "label": "stat name", "value": "formatted value", "sub": "optional context" }
  ],
  "barChart": {
    "title": "Chart title",
    "items": [
      { "label": "name", "value": 123 }
    ]
  },
  "donutChart": {
    "title": "Distribution title",
    "items": [
      { "label": "category", "value": 40 }
    ]
  },
  "summary": "A 2-4 sentence plain-English summary of what this data shows. Write it for someone who knows nothing about data. Be specific and insightful.",
  "insights": ["key insight 1", "key insight 2", "key insight 3", "key insight 4"]
}

Rules:
- stats: 3-5 most important numbers/facts
- barChart: top 5-8 items with numeric values for comparison
- donutChart: 3-6 categories showing breakdown/distribution
- If the data doesn't clearly have bar or donut data, invent reasonable chart interpretations from what IS there
- insights: 3-5 short chips (5 words max each)
- Be specific — use actual numbers from the data

Data to analyze:
${raw.slice(0, 4000)}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      const text = data.content.map(b => b.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      renderDashboard(parsed);
    } catch (err) {
      console.error(err);
      alert('Something went wrong analyzing your data. Please try again.');
      reset();
    }
  }

  const COLORS = ['#c8f04a','#4af0c8','#f04a8c','#4a8cf0','#f0c84a','#c84af0'];

  function renderDashboard(d) {
    document.getElementById('loading').classList.remove('active');

    document.getElementById('dashTitle').textContent = d.title || 'Your Data, Clarified';

    const statsRow = document.getElementById('statsRow');
    statsRow.innerHTML = (d.stats || []).map(s => `
      <div class="stat-card">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value">${s.value}</div>
        ${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ''}
      </div>
    `).join('');

    const grid = document.getElementById('dashGrid');
    grid.innerHTML = '';

    if (d.barChart && d.barChart.items && d.barChart.items.length > 0) {
      const max = Math.max(...d.barChart.items.map(i => i.value));
      const barHTML = d.barChart.items.map((item, idx) => {
        const pct = max > 0 ? (item.value / max * 100) : 0;
        return `
          <div class="bar-row">
            <div class="bar-label" title="${item.label}">${item.label}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%;background:${COLORS[idx % COLORS.length]}"></div>
            </div>
            <div class="bar-val">${formatVal(item.value)}</div>
          </div>
        `;
      }).join('');

      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `
        <div class="card-label">${d.barChart.title || 'Comparison'}</div>
        <div class="bar-chart">${barHTML}</div>
      `;
      grid.appendChild(card);
    }

    if (d.donutChart && d.donutChart.items && d.donutChart.items.length > 0) {
      const total = d.donutChart.items.reduce((s, i) => s + i.value, 0);
      const donutSVG = buildDonut(d.donutChart.items, total);
      const legendHTML = d.donutChart.items.map((item, idx) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${COLORS[idx % COLORS.length]}"></div>
          <div class="legend-name">${item.label}</div>
          <div class="legend-pct">${total > 0 ? Math.round(item.value / total * 100) : 0}%</div>
        </div>
      `).join('');

      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `
        <div class="card-label">${d.donutChart.title || 'Distribution'}</div>
        <div class="donut-wrap">
          ${donutSVG}
          <div class="donut-legend">${legendHTML}</div>
        </div>
      `;
      grid.appendChild(card);
    }

    document.getElementById('summaryText').textContent = d.summary || '';
    document.getElementById('insightChips').innerHTML = (d.insights || []).map((ins, i) =>
      `<div class="chip ${i === 0 ? 'highlight' : ''}">${ins}</div>`
    ).join('');

    document.getElementById('dashboard').classList.add('active');
  }

  function buildDonut(items, total) {
    const size = 120, cx = 60, cy = 60, r = 44, strokeW = 16;
    const circ = 2 * Math.PI * r;
    let offset = 0;
    let paths = '';
    items.forEach((item, idx) => {
      const pct = total > 0 ? item.value / total : 0;
      const dash = pct * circ;
      const gap = circ - dash;
      paths += `<circle
        cx="${cx}" cy="${cy}" r="${r}"
        fill="none"
        stroke="${COLORS[idx % COLORS.length]}"
        stroke-width="${strokeW}"
        stroke-dasharray="${dash} ${gap}"
        stroke-dashoffset="${-offset * circ}"
        transform="rotate(-90 ${cx} ${cy})"
      />`;
      offset += pct;
    });
    return `<svg class="donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2026" stroke-width="${strokeW}"/>
      ${paths}
    </svg>`;
  }

  function formatVal(v) {
    if (typeof v !== 'number') return v;
    if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
    if (v >= 1000) return (v / 1000).toFixed(1) + 'K';
    return v % 1 === 0 ? v.toString() : v.toFixed(1);
  }

  function reset() {
    document.getElementById('dashboard').classList.remove('active');
    document.getElementById('loading').classList.remove('active');
    document.getElementById('inputSection').style.display = '';
    document.getElementById('pasteArea').value = '';
    document.getElementById('pasteArea').placeholder = 'Paste anything — a table, raw numbers, a report, bullet points, anything...';
    document.getElementById('statsRow').innerHTML = '';
    document.getElementById('dashGrid').innerHTML = '';
    fileContent = '';
  }
</script>

</body>
</html>
